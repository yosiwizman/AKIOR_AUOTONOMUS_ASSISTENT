<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
<defs>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2.8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="orbGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
    <stop offset="22%" stop-color="#d9ffff" stop-opacity="1"/>
    <stop offset="52%" stop-color="#6ef4ff" stop-opacity="0.72"/>
    <stop offset="100%" stop-color="#00d7ff" stop-opacity="0"/>
  </radialGradient>
</defs>

<circle cx="512" cy="512" r="86" fill="url(#orbGrad)" filter="url(#softGlow)"/>
<circle cx="512" cy="512" r="18" fill="#ffffff" fill-opacity="0.98" filter="url(#softGlow)"/>
<circle cx="512" cy="512" r="44" fill="none" stroke="#bbffff" stroke-opacity="0.56" stroke-width="1.8" filter="url(#glow)"/>
</svg>