    <stop offset="22%" stop-color="#d9ffff" stop-opacity="1"/>
    <stop offset="52%" stop-color="#6ef4ff" stop-opacity="0.72"/>
    <stop offset="100%" stop-color="#00d7ff" stop-opacity="0"/>
  </radialGradient>
</defs>

